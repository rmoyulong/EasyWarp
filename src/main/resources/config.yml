############################
##  === [ EASY WARP ] === ##
############################

# 插件发送给玩家的消息中显示的名称
# 例如：[服务器名称] 你已被传送。
server-name: "&3[&6便捷传送&3]"

# 传送前的延迟时间（秒），设为 0 表示无延迟
warp-delay: 10

# 传送冷却时间（秒），设为 0 表示无冷却
warp-cooldown: 0

# 如果启用，等待传送时会显示倒计时
display-countdown: false


#============================================================================================================================#
#============================================================================================================================#
#============================================================================================================================#


#变量说明：
#{server}  - 服务器名称
#{delay}   - 延迟时间
#{name}    - 玩家名称
#{display} - 显示名称
#{node}    - 权限节点
#{command} - 命令名称
#{page}    - 当前页码
#{pages}   - 总页数
#{target}  - 目标玩家
#{warp}    - 传送点名称
#{time}    - 时间

#消息内容
messages:
  warp:
    other: "{server}&a 你已将 &c{target}&a 传送至 &c{warp}&a。"
    cancelled: "&c传送已被取消"
    completed: "{server}&a 你已被传送至 &c{warp}&a。"
    delayed: "{server}&a 你将在 &c{delay}&a 秒后被传送。"
    removed: "{server}&a 传送点 &c{warp} &a已被移除。"
    set: "{server}&a 传送点 &c{warp} &a已设置。"
    list: "{server}&a 可用传送点 &c({page}/{pages})"
    countdown: "{server}&a 你将在 &c{time}&a 秒后被传送。"
    cooldown: "{server}&a 你需等待 &c{time}&a 秒后才能再次传送。"
    no-permission:
    - "&c错误：你没有使用此传送点的权限。"
    - "&c -> 使用 /warps 查看可用传送点"
  error:
    illegal-char: "&c错误：传送点名称包含非法字符。"
    no-warp:
    - "&c错误：该传送点不存在。"
    - "&c -> 使用 /warps 查看可用传送点"
    no-warp-given:
    - "&c错误：正确用法 /warp <传送点> || /warp <玩家> <传送点>"
    - "&c -> 使用 /warps 查看可用传送点"
    no-permission: "&c错误：你需要 '{node}' 权限才能执行此操作。"
    no-page: "&c错误：正确用法 /{command} <页码>"
    no-player: "&c错误：未找到该玩家。"
    not-player: "&c错误：只有玩家才能执行此操作。"
    cannot-overwrite: "&c错误：该传送点已存在。"
  config:
    reloaded: "{server}&a 配置文件已重载。"

#多行消息示例
#  example:
#  - 这是第一行
#  - 这是第二行


#============================================================================================================================#
#============================================================================================================================#
#============================================================================================================================#

#如果设为 true，玩家需要权限或 OP 才能使用 /warp 命令
warp-requires-permissions: true

#如果设为 true，玩家需要权限或 OP 才能使用 /listwarps 命令
listwarps-requires-permissions: true

#如果设为 true，玩家需要权限或 OP 才能使用 /set-warp 命令
setwarp-requires-permissions: true

#如果设为 true，玩家需要权限或 OP 才能使用 /del-warp 命令
delwarp-requires-permissions: true

#如果设为 true，玩家需要权限或 OP 才能对其他人使用 /warp 命令
warp-others-requires-permissions: true

#如果设为 true，玩家需要 'easywarp.warp.<传送点名称>' 权限才能使用特定传送点，或 'easywarp.warp.*' 使用所有传送点
per-warp-permissions: true

#如果设为 true，玩家需要 'easywarp.sign.use' 权限才能使用传送牌子
signs-require-permissions: true

#如果设为 true，即使上方的 per-warp-permissions 设为 false，使用传送牌子时仍需要逐传送点权限
#建议保持为 'false'
signs-per-warp-permissions: false

#如果设为 true，拥有 'easywarp.delay.bypass' 权限的玩家可以跳过传送延迟
permissions-bypass-delay: true

#如果设为 true，OP 玩家可以跳过传送延迟
ops-bypass-delay: true

#如果设为 true，传送其他玩家时（/warp 玩家 传送点），目标玩家将跳过延迟
warp-other-bypass-delay: true

#如果设为 true，使用传送牌子时玩家将跳过延迟
signs-bypass-delay: true

#如果设为 true，使用传送牌子时玩家将跳过冷却时间
signs-bypass-cooldown: true

#如果设为 false，尝试 /setwarp 设置已存在的传送点时会报错
allow-warp-overwrite: true